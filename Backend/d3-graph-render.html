<!DOCTYPE html>
<meta charset="utf-8">

<svg width="1200" height="800"></svg>

<script src="https://d3js.org/d3.v4.min.js"></script>
<script>
// Load JSON data using fetch
var nodes, links;

fetch('./python-dependencies_embedded_0.json')
  .then(response => response.json())
  .then(data => {
    nodes = data.nodes;
    links = data.links;
    initializeVisualization();
  })
  .catch(error => {
    console.error('Error loading data:', error);
    // Fallback: try to load the other JSON file
    return fetch('./python-dependencies.json');
  })
  .then(response => response ? response.json() : null)
  .then(data => {
    if (data) {
      nodes = data.nodes;
      links = data.links;
      initializeVisualization();
    }
  })
  .catch(error => {
    console.error('Error loading fallback data:', error);
  });

function initializeVisualization() {
// Convert string references in links to object references
var nodeMap = {};
nodes.forEach(function(node) {
  nodeMap[node.id] = node;
});

// Filter out links that reference non-existent nodes
links = links.filter(function(link) {
  return nodeMap[link.source] && nodeMap[link.target];
});

// Convert string references to object references
links.forEach(function(link) {
  link.source = nodeMap[link.source];
  link.target = nodeMap[link.target];
});

console.log("Filtered links:", links.length);

function getNeighbors(node) {
  return links.reduce(function (neighbors, link) {
      if (link.target.id === node.id) {
        neighbors.push(link.source.id)
      } else if (link.source.id === node.id) {
        neighbors.push(link.target.id)
      }
      return neighbors
    },
    [node.id]
  )
}

function isNeighborLink(node, link) {
  return link.target.id === node.id || link.source.id === node.id
}


function getNodeColor(node, neighbors) {
  if (Array.isArray(neighbors) && neighbors.indexOf(node.id) > -1) {
    return node.level === 1 ? 'blue' : 'green'
  }

  return node.level === 1 ? 'red' : 'gray'
}


function getLinkColor(node, link) {
  return isNeighborLink(node, link) ? 'green' : '#E5E5E5'
}

function getTextColor(node, neighbors) {
  return Array.isArray(neighbors) && neighbors.indexOf(node.id) > -1 ? 'green' : 'black'
}

var width = Math.min(window.innerWidth, 1200)  // Cap width to prevent cutoff
var height = Math.min(window.innerHeight, 800)  // Cap height to prevent cutoff

var svg = d3.select('svg')
svg.attr('width', width).attr('height', height)

// Add zoom behavior
var zoom = d3.zoom()
  .scaleExtent([0.1, 4])
  .on('zoom', function() {
    container.attr('transform', d3.event.transform);
  });

var container = svg.append('g');
svg.call(zoom);

// simulation setup with all forces
var linkForce = d3
  .forceLink()
  .id(function (d) { return d.id })
  .distance(120)  // Reduced distance for better layout
  .strength(0.3)  // Increased strength for better connections

var simulation = d3
  .forceSimulation()
  .force('link', linkForce)
  .force('charge', d3.forceManyBody().strength(-300))  // Reduced charge strength
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collision', d3.forceCollide().radius(40))  // Reduced collision radius
  .force('x', d3.forceX(width/2).strength(0.05))  // Reduced x force
  .force('y', d3.forceY(height/2).strength(0.05))  // Reduced y force
  .alpha(0.5)  // Increased initial alpha
  .alphaDecay(0.02)  // Slower decay

var dragDrop = d3.drag().on('start', function (node) {
  node.fx = node.x
  node.fy = node.y
}).on('drag', function (node) {
  simulation.alphaTarget(0.7).restart()
  node.fx = d3.event.x
  node.fy = d3.event.y
})/*.on('end', function (node) {
  if (!d3.event.active) {
    simulation.alphaTarget(0)
  }
  node.fx = null
  node.fy = null
})*/

function selectNode(selectedNode) {
  var neighbors = getNeighbors(selectedNode)

  // we modify the styles to highlight selected nodes
  nodeElements.attr('fill', function (node) { return getNodeColor(node, neighbors) })
  textElements.attr('fill', function (node) { return getTextColor(node, neighbors) })
  linkElements.attr('stroke', function (link) { return getLinkColor(selectedNode, link) })
}

var linkElements = container.append("g")
  .attr("class", "links")
  .selectAll("line")
  .data(links)
  .enter().append("line")
    .attr("stroke-width", 1)
	  .attr("stroke", "rgba(50, 50, 50, 0.2)")

var linkText = container.append("g")
    .attr("class", "texts")
    .selectAll("text")
    .data(links)
    .enter().append("text")
   .attr("font-family", "Arial, Helvetica, sans-serif")
    .attr("fill", "Black")
    .style("font", "normal 10px Arial")
    .attr("text-anchor", "middle")
    .attr("dy", function(d, i) {
        // Offset labels to avoid overlap
        return (i % 3 - 1) * 15; // Stagger labels vertically
    })
    .text(function(d) {
        return d.linkName;
    });

var nodeElements = container.append("g")
  .attr("class", "nodes")
  .selectAll("circle")
  .data(nodes)
  .enter().append("circle")
    .attr("r", function(d) { return d.level === 1 ? 15 : 10 })
    .attr("fill", getNodeColor)
    .attr("stroke", "#fff")
    .attr("stroke-width", 2)
    .call(dragDrop)
    .on('click', selectNode)

var textElements = container.append("g")
  .attr("class", "texts")
  .selectAll("text")
  .data(nodes)
  .enter().append("text")
    .text(function (node) { return  node.label })
	  .attr("font-size", 12)
	  .attr("dx", 20)
    .attr("dy", 4)
    .attr("font-family", "Arial, sans-serif")
    .attr("fill", "#333")

// Add initial positioning to spread nodes in a balanced circle
var radius = Math.min(width, height) / 3;  // Increased radius for better spread
var centerX = width / 2;
var centerY = height / 2;
var angle = 0;
var angleStep = (2 * Math.PI) / nodes.length;

nodes.forEach(function(d, i) {
  // Ensure node has required properties
  if (!d.x) d.x = centerX + radius * Math.cos(angle);
  if (!d.y) d.y = centerY + radius * Math.sin(angle);
  if (!d.vx) d.vx = 0;
  if (!d.vy) d.vy = 0;
  angle += angleStep;
});

simulation.nodes(nodes).on('tick', () => {
  // Constrain nodes to viewport boundaries with better padding
  var padding = 60;  // Increased padding to prevent cutoff
  nodes.forEach(function(node) {
    node.x = Math.max(padding, Math.min(width - padding, node.x));
    node.y = Math.max(padding, Math.min(height - padding, node.y));
  });
  
  nodeElements
    .attr('cx', function (node) { return node.x })
    .attr('cy', function (node) { return node.y })
  textElements
    .attr('x', function (node) { return node.x })
    .attr('y', function (node) { return node.y })
  linkElements
    .attr('x1', function (link) { return link.source.x })
    .attr('y1', function (link) { return link.source.y })
    .attr('x2', function (link) { return link.target.x })
    .attr('y2', function (link) { return link.target.y })
    linkText
    .attr("x", function(link) {return ((link.source.x + link.target.x)/2)})
    .attr("y", function(link) {return ((link.source.y + link.target.y)/2)})
    .attr("dy", function(d, i) {
        // Better offset calculation to avoid overlaps
        var angle = Math.atan2(d.target.y - d.source.y, d.target.x - d.source.x);
        var offset = Math.sin(angle) * 20; // Perpendicular offset
        return offset + (i % 2) * 10; // Additional stagger
    })
})

simulation.force("link").links(links)

// Restart simulation with higher alpha for better initial movement
simulation.alpha(1).restart()

// Add some debugging
console.log("Nodes:", nodes.length);
console.log("Links:", links.length);
console.log("Sample node:", nodes[0]);
console.log("Sample link:", links[0]);
console.log("Simulation alpha:", simulation.alpha());
console.log("Canvas dimensions:", width, "x", height);

// Let simulation run for a bit then slow it down
setTimeout(function() {
  simulation.alphaTarget(0.1);
}, 3000);  // Increased time for better settling
}

</script>
